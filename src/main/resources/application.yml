spring:
  datasource:
    url: jdbc:h2:mem:netpulse_vpn;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# VPN Configuration
vpn:
  default-crypto: CURVE25519
  mgmt-token: ${VPN_MGMT_TOKEN:changeme}