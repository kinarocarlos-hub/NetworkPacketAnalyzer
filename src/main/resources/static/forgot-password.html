<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password - NetPulse</title>
  <style>
    :root { --primary:#6366f1; --bg:#0a0f1e; --card:#1e293b; --text:#f1f5f9; --error:#f87171; }
    body { font-family: system-ui; background:var(--bg); margin:0; padding:2rem; display:flex; justify-content:center; align-items:center; min-height:100vh; color:var(--text); }
    .card { background:var(--card); padding:2rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.3); width:100%; max-width:400px; }
    h1 { margin:0 0 1rem; }
    input { width:100%; padding:.75rem; margin:.5rem 0; border:1px solid #334155; border-radius:4px; background:#0f172a; color:var(--text); }
    button { width:100%; padding:.75rem; margin:.5rem 0; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer; }
    .error { color:var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <form id="resetForm">
      <input type="email" id="email" placeholder="Email" required>
      <div class="error" id="err"></div>
      <button type="submit">Send Reset Link</button>
    </form>
    <p style="text-align:center;margin-top:1rem"><a href="/sign-in">Back to sign in</a></p>
  </div>
  <script>
    document.getElementById('resetForm').onsubmit = e => {
      e.preventDefault();
      fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email: email.value})
      }).then(r => r.json()).then(d => {
        if (d.token) {
          // Show reset form for demo
          document.body.innerHTML = `
            <div class="card">
              <h1>Set New Password</h1>
              <form id="newPassForm">
                <input type="hidden" id="token" value="${d.token}">
                <input type="password" id="pass" placeholder="New password" required>
                <button type="submit">Update Password</button>
              </form>
            </div>`;
          document.getElementById('newPassForm').onsubmit = ev => {
            ev.preventDefault();
            fetch('/api/auth/reset-password', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({token: token.value, password: pass.value})
            }).then(r => r.json()).then(d => {
              if (d.status === 'reset') location.href = '/sign-in';
            });
          };
        } else {
          alert('Check your email for reset link');
        }
      });
    };
  </script>
</body>
</html>
