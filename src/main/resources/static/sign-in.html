<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - NetPulse</title>
  <style id="theme">
    :root { --primary:#6366f1; --bg:#0a0f1e; --card:#1e293b; --text:#f1f5f9; --error:#f87171; }
    body { font-family: system-ui; background:var(--bg); margin:0; padding:2rem; display:flex; justify-content:center; align-items:center; min-height:100vh; color:var(--text); }
    .card { background:var(--card); padding:2rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.3); width:100%; max-width:400px; }
    h1 { margin:0 0 1rem; }
    input { width:100%; padding:.75rem; margin:.5rem 0; border:1px solid #334155; border-radius:4px; background:#0f172a; color:var(--text); }
    button { width:100%; padding:.75rem; margin:.5rem 0; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer; }
    button:hover { opacity:.9; }
    .error { color:var(--error); font-size:.875rem; }
    a { color:var(--primary); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
<form id="login">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <div class="error" id="err"></div>
        <button type="submit">Sign In</button>
      </form>
      <div id="clerk-captcha" style="margin-top:1rem"></div>
    <p style="text-align:center;margin-top:1rem"><a href="/forgot-password">Forgot password?</a></p>
    <p style="text-align:center;margin-top:0.5rem"><a href="/sign-up">Create account</a></p>
  </div>
  <script>
    document.getElementById('login').onsubmit = e => {
      e.preventDefault();
      fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email: email.value, password: pass.value})
      }).then(r => r.json()).then(d => {
        if (d.authenticated) {
          localStorage.token = d.token;
          localStorage.userId = d.userId;
          location.href = '/dashboard';
        } else if (d.error === 'mfa_required') {
          location.href = '/mfa-verify?userId=' + d.userId;
        } else {
          err.textContent = d.error || 'Login failed';
        }
      });
    };
  </script>
</body>
</html>
