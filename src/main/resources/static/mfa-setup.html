<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Setup MFA - NetPulse</title>
  <style>
    :root { --primary:#6366f1; --bg:#0a0f1e; --card:#1e293b; --text:#f1f5f9; --error:#f87171; }
    body { font-family: system-ui; background:var(--bg); margin:0; padding:2rem; display:flex; justify-content:center; align-items:center; min-height:100vh; color:var(--text); }
    .card { background:var(--card); padding:2rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.3); width:100%; max-width:400px; }
    h1 { margin:0 0 1rem; }
    input { width:100%; padding:.75rem; margin:.5rem 0; border:1px solid #334155; border-radius:4px; background:#0f172a; color:var(--text); }
    button { width:100%; padding:.75rem; margin:.5rem 0; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer; }
    .error { color:var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set Up MFA</h1>
    <p>Enhance your account security with multi-factor authentication.</p>
    <form id="setupMfa">
      <input type="hidden" id="userId">
      <div>
        <button type="button" onclick="enableMfa()">Enable SMS/Email Code MFA</button>
      </div>
      <div id="status"></div>
    </form>
    <button onclick="location.href='/dashboard'">Skip for now</button>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    userId.value = localStorage.userId;

    async function enableMfa() {
      status.textContent = 'Enabling...';
      const res = await fetch('/api/auth/mfa/enable', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({userId: userId.value})
      });
      const data = await res.json();
      if (data.enabled) {
        status.textContent = 'MFA enabled! Check your email for codes.';
        setTimeout(() => location.href = '/dashboard', 1500);
      }
    }
  </script>
</body>
</html>
